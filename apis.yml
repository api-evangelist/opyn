name: Opyn
kind: company
description: Opyn is a DeFi options protocol on Ethereum mainnet best known for Squeeth
  (squared ETH), a Power Perpetual that gives traders continuous exposure to ETH²
  without liquidation risk on long positions. The protocol encompasses the Gamma Protocol
  (v2 options with cash-settled European options), the Crab Strategy (automated ETH²/ETH
  delta-neutral vault), Bull Strategy, and Opyn Markets (concentrated-liquidity perps).
  Developers integrate via The Graph GraphQL subgraph for querying squeeth positions,
  vault data, funding rates, and on-chain event history, combined with direct Ethereum
  smart-contract interaction through the Controller, Oracle, WPowerPerp, and Strategy
  contracts. No centralised REST API key is required; data access is permissionless
  through the subgraph and blockchain.
