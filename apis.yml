apis:
- aid: opyn:squeeth-subgraph-api
  name: Opyn Squeeth Subgraph API
  description: GraphQL API powered by The Graph that indexes all on-chain Squeeth
    events on Ethereum mainnet. Enables developers to query oSQTH positions, short
    vaults, vault collateral and debt, funding (mark/index) history, Crab strategy
    deposits and withdrawals, and liquidation events without running an archive node.
    The subgraph ID on The Graph network is Ao1QSKEQzsnNyyGKR1Faurjmkr6oNVTbgdxy6diAw9r.
  humanURL: https://thegraph.com/explorer/subgraphs/Ao1QSKEQzsnNyyGKR1Faurjmkr6oNVTbgdxy6diAw9r?view=Overview&chain=mainnet
