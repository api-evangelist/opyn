- aid: opyn:squeeth-portal-api
  name: Squeeth Portal Auction API
  description: Web interface and data feed for the Crab Strategy weekly auction mechanism.
    The Squeeth Portal at squeethportal.xyz provides auction status, hedging queue,
    and rebalancing parameters used by Crab v2 and Jumbo Crab vaults. Developers can
    read auction state directly from the CrabStrategyV2 contract (0x3B960E47784150F5a63777201ee2B15253D713e8)
    on Ethereum mainnet.
  humanURL: https://www.squeethportal.xyz/auction
