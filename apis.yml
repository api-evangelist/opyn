- aid: opyn:gamma-subgraph-api
  name: Opyn Gamma Subgraph API
  description: GraphQL API via The Graph that indexes the Gamma Protocol (Opyn v2)
    on Ethereum mainnet. Covers oToken creation, option series, vault collateral,
    minting and burning events, settlement, and operator authorisations for European
    cash-settled options. Useful for querying options series data, vault collateral
    ratios, and historical settlement prices.
